name: MobSF APK Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mobsf-scan:
    runs-on: ubuntu-latest

    env:
      APK_FILE: DivaApplication.apk
      MOBSF_URL: http://localhost:8000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify APK Exists
        run: |
          ls -lah
          test -f "$APK_FILE"

      - name: Pull MobSF
        run: |
          docker pull opensecurity/mobile-security-framework-mobsf:latest

      - name: Start MobSF
        run: |
          docker run -d \
            --name mobsf \
            -p 8000:8000 \
            opensecurity/mobile-security-framework-mobsf:latest

      - name: Wait for MobSF
        run: |
          timeout 600 bash -c '
            until curl -s http://localhost:8000 > /dev/null; do
              echo "Waiting for MobSF..."
              sleep 10
            done
          '

      - name: Show MobSF Logs
        run: |
          docker logs mobsf --tail 200

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get API Key
        run: |
          API_KEY=$(curl -s http://localhost:8000/api_docs | grep -oP '(?<=API Key: )[A-Za-z0-9]+')

          if [ -z "$API_KEY" ]; then
            echo "Failed to extract API key"
            echo "==== API_DOCS ===="
            curl -s http://localhost:8000/api_docs
            exit 1
          fi

          echo "API key length: ${#API_KEY}"
          echo "MOBSF_API_KEY=$API_KEY" >> $GITHUB_ENV

      - name: Upload APK
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "file=@$APK_FILE" \
            "$MOBSF_URL/api/v1/upload")

          echo "$RESPONSE"

          HASH=$(echo "$RESPONSE" | jq -r '.hash')
          FILE_NAME=$(echo "$RESPONSE" | jq -r '.file_name')

          if [ "$HASH" = "null" ] || [ -z "$HASH" ]; then
            echo "Upload failed"
            exit 1
          fi

          echo "HASH=$HASH" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Run Scan
        run: |
          curl -v \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "scan_type=apk" \
            -F "file_name=$FILE_NAME" \
            -F "hash=$HASH" \
            "$MOBSF_URL/api/v1/scan"

      - name: Download JSON Report
        run: |
          curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "hash=$HASH" \
            "$MOBSF_URL/api/v1/report_json" \
            -o mobsf-report.json

      - name: Download PDF Report
        run: |
          curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "hash=$HASH" \
            "$MOBSF_URL/api/v1/download_pdf" \
            -o mobsf-report.pdf

      - name: Verify Reports
        run: |
          ls -lah
          file mobsf-report.json || true
          file mobsf-report.pdf || true
          cat mobsf-report.json | head -50 || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-security-report
          path: |
            mobsf-report.json
            mobsf-report.pdf

      - name: Cleanup
        if: always()
        run: |
          docker stop mobsf || true
          docker rm mobsf || true
