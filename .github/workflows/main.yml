name: MobSF APK Security Scan

# ─────────────────────────────────────────────
#  Triggers
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - "**.apk"           # Only run when an APK is actually pushed
  workflow_dispatch:
    inputs:
      apk_path:
        description: "Optional: relative path to a specific APK (leave blank to scan all APKs in repo)"
        required: false
        default: ""
      fail_on_score:
        description: "Fail pipeline if security score is below this value (0 = never fail)"
        required: false
        default: "60"

# ─────────────────────────────────────────────
#  Shared env
# ─────────────────────────────────────────────
env:
  MOBSF_URL: http://localhost:8000
  FAIL_SCORE: ${{ github.event.inputs.fail_on_score || '60' }}

jobs:

  # ─────────────────────────────────────────────
  #  JOB 1 — Detect APKs that were pushed
  # ─────────────────────────────────────────────
  detect-apks:
    name: Detect changed APKs
    runs-on: ubuntu-latest
    outputs:
      apk_matrix: ${{ steps.build-matrix.outputs.matrix }}
      apk_count:  ${{ steps.build-matrix.outputs.count }}

    steps:
      - name: Checkout repository (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Need history to diff against previous commit

      # ── Decide which APKs to scan ──────────────────────────────────────────
      - name: Build APK matrix
        id: build-matrix
        run: |
          set -euo pipefail

          APK_LIST=()

          # ── Case 1: manual override ──────────────────────────────────────
          if [ -n "${{ github.event.inputs.apk_path }}" ]; then
            EXPLICIT="${{ github.event.inputs.apk_path }}"
            if [ ! -f "$EXPLICIT" ]; then
              echo "::error::Specified APK not found: $EXPLICIT"
              exit 1
            fi
            APK_LIST=("$EXPLICIT")
            echo "Manual override — scanning: $EXPLICIT"

          # ── Case 2: push — only files changed in this push ───────────────
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"

            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "Initial push — scanning all APKs in repository"
              while IFS= read -r -d '' f; do
                APK_LIST+=("$f")
              done < <(find . -type f -name "*.apk" -print0)
            else
              echo "Scanning APKs changed between $BEFORE..$AFTER"
              while IFS= read -r f; do
                if [[ "$f" == *.apk ]] && [ -f "$f" ]; then
                  APK_LIST+=("./$f")
                fi
              done < <(git diff --name-only "$BEFORE" "$AFTER" || git diff --name-only HEAD~1 HEAD)
            fi

          # ── Case 3: manual dispatch, no path → full repo scan ────────────
          else
            echo "Full repo scan (workflow_dispatch)"
            while IFS= read -r -d '' f; do
              APK_LIST+=("$f")
            done < <(find . -type f -name "*.apk" -print0)
          fi

          # ── Validate ─────────────────────────────────────────────────────
          if [ ${#APK_LIST[@]} -eq 0 ]; then
            echo "::warning::No APKs found — nothing to scan."
            echo 'matrix={"apk":[]}' >> "$GITHUB_OUTPUT"
            echo "count=0"           >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "APKs to scan (${#APK_LIST[@]}):"
          printf '  %s\n' "${APK_LIST[@]}"

          # ── Build JSON matrix ─────────────────────────────────────────────
          JSON_ARRAY=$(printf '%s\n' "${APK_LIST[@]}" | jq -R . | jq -sc '{apk:.}')
          echo "matrix=$JSON_ARRAY"           >> "$GITHUB_OUTPUT"
          echo "count=${#APK_LIST[@]}"        >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  #  JOB 2 — Scan each APK (matrix with Fixes applied)
  # ─────────────────────────────────────────────
  mobsf-scan:
    name: "Scan › ${{ matrix.apk }}"
    needs: detect-apks
    if: needs.detect-apks.outputs.apk_count != '0'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false            # Let other APKs finish even if one fails
      matrix: ${{ fromJson(needs.detect-apks.outputs.apk_matrix) }}

    steps:
      # ── Derive a safe artifact name and API Secret ───────────────────────
      - name: Set APK metadata
        id: meta
        run: |
          SHARED_KEY=$(openssl rand -hex 32)
          echo "mobsf_secret_key=$SHARED_KEY" >> "$GITHUB_ENV"

          APK_PATH="${{ matrix.apk }}"
          APK_BASENAME=$(basename "$APK_PATH" .apk)
          SAFE_NAME=$(echo "$APK_BASENAME" | tr -cs '[:alnum:]._-' '_')
          echo "apk_path=$APK_PATH"     >> "$GITHUB_OUTPUT"
          echo "apk_basename=$APK_BASENAME" >> "$GITHUB_OUTPUT"
          echo "safe_name=$SAFE_NAME"   >> "$GITHUB_OUTPUT"
          echo "Scanning: $APK_PATH  (artifact label: $SAFE_NAME)"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate APK exists
        run: |
          APK="${{ steps.meta.outputs.apk_path }}"
          if [ ! -f "$APK" ]; then
            echo "::error::APK not found at path: $APK"
            exit 1
          fi
          echo "APK size: $(du -sh "$APK" | cut -f1)"

      # FIX: Installed 'bc' package manually so the floating point score checks pass
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl bc

      - name: Pull MobSF Docker image
        run: docker pull opensecurity/mobile-security-framework-mobsf:latest

      # FIX: Directly injecting the securely generated token into the container
      - name: Start MobSF
        run: |
          docker run -d \
            --name mobsf \
            -p 8000:8000 \
            -e MOBSF_REST_OPENAPIKEY="${{ env.mobsf_secret_key }}" \
            opensecurity/mobile-security-framework-mobsf:latest

      # FIX: Bypassed unreliable log scraping; tracking via deterministic environment key
      - name: Wait for MobSF API readiness
        run: |
          echo "Polling MobSF API using pre-shared key..."
          ATTEMPTS=0
          MAX_ATTEMPTS=60 
          API_KEY="${{ env.mobsf_secret_key }}"
          
          echo "MOBSF_API_KEY=$API_KEY" >> "$GITHUB_ENV"

          until curl -sf -H "Authorization: $API_KEY" "$MOBSF_URL/api/v1/scans" >/dev/null; do
            echo "  MobSF not ready yet… (attempt $((ATTEMPTS+1)))"
            sleep 10
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
              echo "::error::MobSF API did not become ready in time"
              docker logs mobsf --tail 50
              exit 1
            fi
          done
          echo "MobSF API is ready ✓"

      - name: Upload APK to MobSF
        id: upload
        run: |
          APK="${{ steps.meta.outputs.apk_path }}"
          RESPONSE=$(curl -sf \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "file=@${APK}" \
            "$MOBSF_URL/api/v1/upload")

          HASH=$(echo "$RESPONSE"     | jq -r '.hash      // empty')
          FILE_NAME=$(echo "$RESPONSE" | jq -r '.file_name // empty')
          SCAN_TYPE=$(echo "$RESPONSE" | jq -r '.scan_type // empty')

          if [ -z "$HASH" ]; then
            echo "::error::Upload failed — no hash returned"
            exit 1
          fi

          echo "hash=$HASH"           >> "$GITHUB_OUTPUT"
          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "scan_type=$SCAN_TYPE" >> "$GITHUB_OUTPUT"

      - name: Trigger static analysis
        run: |
          curl -sf \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "scan_type=${{ steps.upload.outputs.scan_type }}" \
            -F "file_name=${{ steps.upload.outputs.file_name }}" \
            -F "hash=${{ steps.upload.outputs.hash }}" \
            "$MOBSF_URL/api/v1/scan" \
            -o scan-result.json

      - name: Wait for analysis to complete
        run: |
          HASH="${{ steps.upload.outputs.hash }}"
          MAX_WAIT=600  
          INTERVAL=20
          ELAPSED=0

          while true; do
            STATUS=$(curl -sf \
              -H "Authorization: $MOBSF_API_KEY" \
              -d "hash=$HASH" \
              "$MOBSF_URL/api/v1/report_json" 2>/dev/null || echo '{}')

            if echo "$STATUS" | jq -e '.average_cvss // .security_score' >/dev/null 2>&1; then
              echo "Analysis complete ✓"
              break
            fi

            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "::error::Analysis timeout"
              exit 1
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

      - name: Download JSON report
        run: |
          curl -sf \
            -H "Authorization: $MOBSF_API_KEY" \
            -d "hash=${{ steps.upload.outputs.hash }}" \
            "$MOBSF_URL/api/v1/report_json" \
            -o mobsf-report.json

      - name: Download PDF report
        run: |
          curl -sf \
            -H "Authorization: $MOBSF_API_KEY" \
            -d "hash=${{ steps.upload.outputs.hash }}" \
            "$MOBSF_URL/api/v1/download_pdf" \
            -o mobsf-report.pdf

      - name: Evaluate security score
        id: score-gate
        run: |
          SCORE=$(jq -r '.security_score // .average_cvss // "N/A"' mobsf-report.json)
          echo "Security score: $SCORE"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          THRESHOLD="${{ env.FAIL_SCORE }}"

          if [ "$THRESHOLD" -gt 0 ] 2>/dev/null && [ "$SCORE" != "N/A" ]; then
            if (( $(echo "$SCORE < $THRESHOLD" | bc -l) )); then
              echo "::error::Security score $SCORE is below threshold $THRESHOLD — failing pipeline"
              exit 1
            fi
          fi

      - name: Write job summary
        if: always()
        run: |
          SAFE_NAME="${{ steps.meta.outputs.safe_name }}"
          SCORE="${{ steps.score-gate.outputs.score || 'N/A' }}"
          HASH="${{ steps.upload.outputs.hash || 'N/A' }}"

          {
            echo "## MobSF Scan — \`$SAFE_NAME\`"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| APK | \`${{ matrix.apk }}\` |"
            echo "| MobSF Hash | \`$HASH\` |"
            echo "| Security Score | **$SCORE** |"
            echo "| Threshold | ${{ env.FAIL_SCORE }} |"
            echo ""
            if [ -f mobsf-report.json ]; then
              echo "### Top Issues"
              echo "\`\`\`"
              jq -r '
                (.manifest_analysis // [])
                | map(select(.severity == "high" or .severity == "critical"))
                | .[:5]
                | .[] | "[\(.severity | ascii_upcase)] \(.title // .issue)"
              ' mobsf-report.json 2>/dev/null || echo "(unable to parse issues)"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # FIX: Gracefully ignoring missing files if the container setup crashed early
      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "mobsf-report-${{ steps.meta.outputs.safe_name }}-${{ github.run_number }}"
          path: |
            mobsf-report.json
            mobsf-report.pdf
            scan-result.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Stop and remove MobSF container
        if: always()
        run: |
          docker stop mobsf || true
          docker rm   mobsf || true
