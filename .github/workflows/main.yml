name: DIVA Application VAPT Scan

on:
  workflow_dispatch:

jobs:
  mobsf_scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start MobSF server
        run: |
          docker run -d --name mobsf -p 8000:8000 \
            -e MOBSF_API_KEY=${{ secrets.MOBSF_API_KEY }} \
            opensecurity/mobsf:latest
          echo "Waiting for MobSF to initialize..."
          sleep 45

      - name: Verify MobSF is running
        run: |
          curl -s --retry 5 --retry-delay 10 \
            http://localhost:8000/ | head -c 100

      - name: Upload APK and get hash
        run: |
          HASH=$(curl -s \
            -F "file=@DivaApplication.apk" \
            -H "Authorization: ${{ secrets.MOBSF_API_KEY }}" \
            http://localhost:8000/api/v1/upload | jq -r '.hash')

          echo "APK hash: $HASH"

          if [ -z "$HASH" ] || [ "$HASH" == "null" ]; then
            echo "Upload failed or hash is null"
            exit 1
          fi

          echo "MOBSF_HASH=$HASH" >> $GITHUB_ENV

      - name: Run scan
        run: |
          curl -s -X POST http://localhost:8000/api/v1/scan \
            -d "scan_type=apk&file_name=DivaApplication.apk&hash=${{ env.MOBSF_HASH }}" \
            -H "Authorization: ${{ secrets.MOBSF_API_KEY }}"

      - name: Export PDF report
        run: |
          curl -s -X POST http://localhost:8000/api/v1/download_pdf \
            -d "hash=${{ env.MOBSF_HASH }}" \
            -H "Authorization: ${{ secrets.MOBSF_API_KEY }}" \
            -o ${{ github.workspace }}/mobsf-report.pdf

      - name: Export JSON report
        run: |
          curl -s -X POST http://localhost:8000/api/v1/report_json \
            -d "hash=${{ env.MOBSF_HASH }}" \
            -H "Authorization: ${{ secrets.MOBSF_API_KEY }}" \
            -o ${{ github.workspace }}/mobsf-report.json

      - name: Verify report files exist
        run: |
          ls -lh ${{ github.workspace }}/mobsf-report.*

      - name: Archive scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DIVA-Security-Report
          path: |
            ${{ github.workspace }}/mobsf-report.json
            ${{ github.workspace }}/mobsf-report.pdf
