name: DIVA Application VAPT Scan
on: 
  workflow_dispatch:

jobs:
  mobsf_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repo
        uses: actions/checkout@v4

      - name: Execute MobSF Static Analysis
        uses: fundacaocerti/mobsf-action@v1.7.2
        with:
          # Make sure this matches your file name exactly
          args: --apk DivaApplication.apk --output mobsf-report

      - name: Archive Scan Reports
        uses: actions/upload-artifact@v4
        with:
          name: DIVA-Security-Report
          path: |
            mobsf-report.json
            mobsf-report.pdf
