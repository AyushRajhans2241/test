name: MobSF APK Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  mobsf:
    runs-on: ubuntu-latest

    env:
      APK_FILE: DivaApplication.apk
      MOBSF_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Start MobSF
        run: |
          docker run -d \
            --name mobsf \
            -p 8000:8000 \
            opensecurity/mobile-security-framework-mobsf:latest

      - name: Wait for MobSF
        run: |
          timeout 600 bash -c '
            until curl -s http://localhost:8000 >/dev/null; do
              echo "Waiting for MobSF..."
              sleep 10
            done
          '
          sleep 60

      - name: Discover MobSF API Key
        run: |
          set +e

          API_KEY=""

          echo "Method 1: Container logs"
          API_KEY=$(docker logs mobsf 2>&1 | grep -oE '[A-Fa-f0-9]{32,64}' | head -1)

          if [ -z "$API_KEY" ]; then
            echo "Method 2: Common config files"

            API_KEY=$(docker exec mobsf sh -c '
              for f in \
                /home/mobsf/.MobSF/config.py \
                /root/.MobSF/config.py \
                /MobSF/.MobSF/config.py
              do
                [ -f "$f" ] && grep -i API "$f"
              done
            ' 2>/dev/null | grep -oE '[A-Fa-f0-9]{32,64}' | head -1)
          fi

          if [ -z "$API_KEY" ]; then
            echo "Method 3: API Docs"

            PAGE=$(curl -s http://localhost:8000/api_docs)

            API_KEY=$(echo "$PAGE" | grep -oE '[A-Fa-f0-9]{32,64}' | head -1)
          fi

          if [ -z "$API_KEY" ]; then
            echo "Unable to locate API key"

            echo "===== CONTAINER LOGS ====="
            docker logs mobsf --tail 200

            echo "===== API_DOCS ====="
            curl -s http://localhost:8000/api_docs | head -200

            exit 1
          fi

          echo "Found candidate key"
          echo "MOBSF_API_KEY=$API_KEY" >> $GITHUB_ENV

      - name: Verify API Key
        run: |
          echo "Testing discovered key..."

          STATUS=$(curl -s \
            -o /tmp/out.txt \
            -w "%{http_code}" \
            -H "Authorization: $MOBSF_API_KEY" \
            "$MOBSF_URL/api/v1/scans")

          echo "HTTP Status: $STATUS"
          cat /tmp/out.txt

          if [ "$STATUS" = "401" ]; then
            echo "Discovered key is invalid"
            exit 1
          fi

      - name: Upload APK
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "file=@$APK_FILE" \
            "$MOBSF_URL/api/v1/upload")

          echo "$RESPONSE"
