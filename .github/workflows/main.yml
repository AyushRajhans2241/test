name: MobSF APK Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mobsf-scan:
    runs-on: ubuntu-latest

    env:
      APK_FILE: DivaApplication.apk
      MOBSF_URL: http://localhost:8000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify APK Exists
        run: |
          ls -lah
          test -f "${APK_FILE}"

      - name: Pull MobSF Image
        run: |
          docker pull opensecurity/mobile-security-framework-mobsf:latest

      - name: Start MobSF Container
        run: |
          docker run -d \
            --name mobsf \
            -p 8000:8000 \
            opensecurity/mobile-security-framework-mobsf:latest

      - name: Wait for MobSF Startup
        run: |
          echo "Waiting for MobSF to start..."
          timeout 300 bash -c '
            until curl -s http://localhost:8000 > /dev/null; do
              echo "MobSF not ready..."
              sleep 10
            done
          '
          echo "MobSF is ready"

      - name: Display MobSF Logs
        run: |
          docker logs mobsf --tail 100

      - name: Obtain API Key
        run: |
          API_KEY=$(docker exec mobsf sh -c "grep -m1 API_KEY /home/mobsf/.MobSF/config.py | cut -d\"'\" -f2")

          if [ -z "$API_KEY" ]; then
            echo "Failed to retrieve API key"
            exit 1
          fi

          echo "MOBSF_API_KEY=$API_KEY" >> $GITHUB_ENV

      - name: Upload APK
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "file=@${APK_FILE}" \
            "${MOBSF_URL}/api/v1/upload")

          echo "$RESPONSE"

          HASH=$(echo "$RESPONSE" | jq -r '.hash')
          FILE_NAME=$(echo "$RESPONSE" | jq -r '.file_name')

          echo "HASH=$HASH" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Run Static Analysis
        run: |
          curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "scan_type=apk" \
            -F "file_name=$FILE_NAME" \
            -F "hash=$HASH" \
            "${MOBSF_URL}/api/v1/scan"

      - name: Download JSON Report
        run: |
          curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "hash=$HASH" \
            "${MOBSF_URL}/api/v1/report_json" \
            -o mobsf-report.json

      - name: Download PDF Report
        run: |
          curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "hash=$HASH" \
            "${MOBSF_URL}/api/v1/download_pdf" \
            -o mobsf-report.pdf

      - name: Verify Reports
        run: |
          ls -lah mobsf-report.*

      - name: Upload Scan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-security-report
          path: |
            mobsf-report.json
            mobsf-report.pdf
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker stop mobsf || true
          docker rm mobsf || true
