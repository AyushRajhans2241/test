name: Mobile VAPT Pipeline
on: 
  workflow_dispatch:

jobs:
  mobsf_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repo
        uses: actions/checkout@v4
      - name: Download Target APK File
        env:
          APK_URL: ${{ secrets.CLIENT_APK_URL }}
        run: curl -L -o target.apk "$APK_URL"
      - name: Execute MobSF Static Analysis
        uses: fundacaocerti/mobsf-action@v1.7.2
        with:
          args: --apk target.apk --output mobsf-report
      - name: Archive Scan Reports
        uses: actions/upload-artifact@v4
        with:
          name: MobSF-Reports
          path: |
            mobsf-report.json
            mobsf-report.pdf
