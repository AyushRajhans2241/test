name: DIVA Application VAPT Scan
on:
  workflow_dispatch:
jobs:
  mobsf_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start MobSF
        run: |
          docker run -d --name mobsf -p 8000:8000 \
            -e MOBSF_API_KEY=supersecretkey123 \
            opensecurity/mobsf:v4.1.1
          sleep 40

      - name: Scan APK
        env:
          API_KEY: supersecretkey123
        run: |
          HASH=$(curl -s -F "file=@DivaApplication.apk" \
            http://localhost:8000/api/v1/upload \
            -H "Authorization: $API_KEY" | jq -r '.hash')
          curl -s -X POST http://localhost:8000/api/v1/scan \
            -d "scan_type=apk&file_name=DivaApplication.apk&hash=$HASH" \
            -H "Authorization: $API_KEY"
          curl -s -X POST http://localhost:8000/api/v1/download_pdf \
            -d "hash=$HASH" -H "Authorization: $API_KEY" -o mobsf-report.pdf
          curl -s -X POST http://localhost:8000/api/v1/report_json \
            -d "hash=$HASH" -H "Authorization: $API_KEY" -o mobsf-report.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: DIVA-Security-Report
          path: |
            mobsf-report.json
            mobsf-report.pdf
