name: MobSF APK Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mobsf-scan:
    runs-on: ubuntu-latest

    env:
      APK_FILE: DivaApplication.apk
      MOBSF_URL: http://localhost:8000
      MOBSF_API_KEY: ${{ secrets.MOBSF_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify APK Exists
        run: |
          ls -lah
          test -f "$APK_FILE"

      - name: Pull MobSF Image
        run: |
          docker pull opensecurity/mobile-security-framework-mobsf:latest

      - name: Start MobSF
        run: |
          docker run -d \
            --name mobsf \
            -p 8000:8000 \
            opensecurity/mobile-security-framework-mobsf:latest

      - name: Wait for MobSF Startup
        run: |
          timeout 600 bash -c '
            until curl -s http://localhost:8000 > /dev/null; do
              echo "Waiting for MobSF..."
              sleep 10
            done
          '
          sleep 60

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Verify MobSF API Access
        run: |
          curl -v \
            -H "Authorization: $MOBSF_API_KEY" \
            "$MOBSF_URL/api/v1/scans" || true

      - name: Upload APK
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "file=@$APK_FILE" \
            "$MOBSF_URL/api/v1/upload")

          echo "$RESPONSE"

          HASH=$(echo "$RESPONSE" | jq -r '.hash')
          FILE_NAME=$(echo "$RESPONSE" | jq -r '.file_name')

          if [ -z "$HASH" ] || [ "$HASH" = "null" ]; then
            echo "APK upload failed"
            exit 1
          fi

          echo "HASH=$HASH" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Run MobSF Scan
        run: |
          curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "scan_type=apk" \
            -F "file_name=$FILE_NAME" \
            -F "hash=$HASH" \
            "$MOBSF_URL/api/v1/scan" \
            -o scan-result.json

          cat scan-result.json

      - name: Download JSON Report
        run: |
          curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "hash=$HASH" \
            "$MOBSF_URL/api/v1/report_json" \
            -o mobsf-report.json

      - name: Download PDF Report
        run: |
          curl -s \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "hash=$HASH" \
            "$MOBSF_URL/api/v1/download_pdf" \
            -o mobsf-report.pdf

      - name: Validate Reports
        run: |
          ls -lah
          echo "=== JSON REPORT ==="
          head -50 mobsf-report.json || true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-security-report
          path: |
            mobsf-report.json
            mobsf-report.pdf

      - name: Show MobSF Logs
        if: always()
        run: |
          docker logs mobsf --tail 200

      - name: Cleanup
        if: always()
        run: |
          docker stop mobsf || true
          docker rm mobsf || true
